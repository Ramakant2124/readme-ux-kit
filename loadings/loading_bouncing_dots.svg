<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" width="120" height="40">
  <circle cx="20" cy="20" r="6" fill="#22d3ee">
    <animate attributeName="cy" values="20;10;20" dur="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="20" r="6" fill="#22d3ee">
    <animate attributeName="cy" values="20;10;20" dur="0.8s" begin="0.15s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="20" r="6" fill="#22d3ee">
    <animate attributeName="cy" values="20;10;20" dur="0.8s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
</svg>