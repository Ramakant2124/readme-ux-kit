<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="80">
  <circle cx="50" cy="50" r="10" stroke="#3b82f6" stroke-width="4" fill="none">
    <animate attributeName="r" values="10;40" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0" dur="1.2s" repeatCount="indefinite"/>
  </circle>
</svg>