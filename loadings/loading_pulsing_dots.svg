<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" width="120" height="40">
  <circle cx="20" cy="20" r="5" fill="#a855f7">
    <animate attributeName="r" values="5;9;5" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="20" r="5" fill="#a855f7">
    <animate attributeName="r" values="5;9;5" dur="1s" begin="0.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" begin="0.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="20" r="5" fill="#a855f7">
    <animate attributeName="r" values="5;9;5" dur="1s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
</svg>