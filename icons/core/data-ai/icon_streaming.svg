<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80">
  <rect x="20" y="30" width="260" height="20" fill="#1e293b" rx="10"/>

  <circle cx="20" cy="40" r="6" fill="#22d3ee">
    <animate attributeName="cx" values="20;280" dur="2s" repeatCount="indefinite"/>
  </circle>

  <circle cx="20" cy="40" r="4" fill="#a855f7">
    <animate attributeName="cx" values="40;300" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
</svg>