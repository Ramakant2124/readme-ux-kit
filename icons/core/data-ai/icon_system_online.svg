<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60">
  <circle cx="30" cy="30" r="6" fill="#22c55e">
    <animate attributeName="r" values="6;10;6" dur="1.2s" repeatCount="indefinite"/>
  </circle>

  <rect x="60" y="20" width="140" height="20" rx="6" fill="#1e293b"/>

  <rect x="60" y="20" width="20" height="20" fill="#22c55e">
    <animate attributeName="width" values="20;140" dur="2s" repeatCount="indefinite"/>
  </rect>
</svg>