<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <circle cx="60" cy="60" r="5" fill="#22d3ee"/>
  <circle cx="60" cy="20" r="4" fill="#a855f7">
    <animateTransform attributeName="transform" type="rotate"
      from="0 60 60" to="360 60 60" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="100" r="4" fill="#22d3ee">
    <animateTransform attributeName="transform" type="rotate"
      from="360 60 60" to="0 60 60" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>