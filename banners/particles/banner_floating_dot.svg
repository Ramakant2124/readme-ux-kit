<svg viewBox="0 0 1200 120" width="100%" height="120" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="120" fill="#020617"/>

  <circle cx="200" cy="60" r="3" fill="#22d3ee">
    <animate attributeName="cy" values="60;20;60" dur="4s" repeatCount="indefinite"/>
  </circle>

  <circle cx="600" cy="80" r="3" fill="#8b5cf6">
    <animate attributeName="cy" values="80;30;80" dur="5s" repeatCount="indefinite"/>
  </circle>

  <circle cx="1000" cy="50" r="3" fill="#22d3ee">
    <animate attributeName="cy" values="50;10;50" dur="6s" repeatCount="indefinite"/>
  </circle>
</svg>