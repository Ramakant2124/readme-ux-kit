<svg viewBox="0 0 1200 120" width="100%" height="120" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="120" fill="#020617"/>

  <circle cx="0" cy="20" r="2" fill="#22d3ee">
    <animate attributeName="cx" values="0;1200" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="20;100" dur="3s" repeatCount="indefinite"/>
  </circle>

  <circle cx="0" cy="80" r="2" fill="#8b5cf6">
    <animate attributeName="cx" values="0;1200" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="80;10" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>