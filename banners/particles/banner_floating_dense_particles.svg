<svg viewBox="0 0 1200 120" width="100%" height="120" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="120" fill="#020617"/>

  <g fill="#22d3ee" opacity="0.7">
    <circle cx="100" cy="80" r="2">
      <animate attributeName="cy" values="80;20;80" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="60" r="2">
      <animate attributeName="cy" values="60;10;60" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="90" r="2">
      <animate attributeName="cy" values="90;30;90" dur="7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g fill="#8b5cf6" opacity="0.6">
    <circle cx="300" cy="70" r="2"/>
    <circle cx="700" cy="50" r="2"/>
    <circle cx="1100" cy="60" r="2"/>
  </g>
</svg>