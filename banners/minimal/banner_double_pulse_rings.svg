<svg viewBox="0 0 1200 120" width="100%" height="120" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="120" fill="#020617"/>

  <g stroke="#22d3ee" fill="none">
    <circle cx="600" cy="60" r="10">
      <animate attributeName="r" values="10;80" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="60" r="10" opacity="0.5">
      <animate attributeName="r" values="10;80" dur="3s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>