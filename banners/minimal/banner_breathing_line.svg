<svg viewBox="0 0 1200 120" width="100%" height="120" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="120" fill="#020617"/>

  <line x1="200" x2="1000" y1="60" y2="60" stroke="#22d3ee" stroke-width="1">
    <animate attributeName="x1" values="200;150;200" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="1000;1050;1000" dur="4s" repeatCount="indefinite"/>
  </line>
</svg>