<svg viewBox="0 0 1200 120" width="100%" height="120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wave1" x1="0" x2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <g transform="translate(0,120) scale(1,-1)">

    <!-- back wave -->
    <path fill="#1e293b" opacity="0.4">
      <animate attributeName="d" dur="7s" repeatCount="indefinite"
        values="
        M0,70 C300,130 900,10 1200,70 L1200,0 L0,0 Z;
        M0,50 C300,10 900,130 1200,50 L1200,0 L0,0 Z;
        M0,70 C300,130 900,10 1200,70 L1200,0 L0,0 Z
        "/>
    </path>

    <!-- front wave -->
    <path fill="url(#wave1)">
      <animate attributeName="d" dur="5s" repeatCount="indefinite"
        values="
        M0,60 C300,120 900,0 1200,60 L1200,0 L0,0 Z;
        M0,40 C300,0 900,120 1200,40 L1200,0 L0,0 Z;
        M0,60 C300,120 900,0 1200,60 L1200,0 L0,0 Z
        "/>
    </path>
  </g>
</svg>