<svg viewBox="0 0 1200 120" width="100%" height="120" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="120" fill="#020617"/>

  <g transform="translate(600 60)">
    <circle r="30" fill="none" stroke="#22d3ee" stroke-width="1.2" opacity="0.75"/>
    <circle r="44" fill="none" stroke="#8b5cf6" stroke-width="0.8" opacity="0.45" stroke-dasharray="3 8">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="16s" repeatCount="indefinite"/>
    </circle>

    <polygon points="0,-18 16,-6 10,14 -10,14 -16,-6" fill="none" stroke="#22d3ee" stroke-width="1"/>
    <line x1="-44" y1="0" x2="-18" y2="0" stroke="#8b5cf6" opacity="0.6"/>
    <line x1="18" y1="0" x2="44" y2="0" stroke="#8b5cf6" opacity="0.6"/>
    <line x1="0" y1="-44" x2="0" y2="-18" stroke="#8b5cf6" opacity="0.6"/>
    <line x1="0" y1="18" x2="0" y2="44" stroke="#8b5cf6" opacity="0.6"/>

    <circle r="2.5" fill="#22d3ee">
      <animate attributeName="r" values="2;4;2" dur="2.3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>