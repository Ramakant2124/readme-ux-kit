<svg viewBox="0 0 1200 120" width="100%" height="120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="orbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="120" fill="#020617"/>

  <line x1="240" y1="60" x2="560" y2="60" stroke="#1e293b"/>
  <line x1="640" y1="60" x2="960" y2="60" stroke="#1e293b"/>

  <line x1="520" y1="40" x2="580" y2="60" stroke="#8b5cf6" opacity="0.35"/>
  <line x1="520" y1="80" x2="580" y2="60" stroke="#8b5cf6" opacity="0.35"/>
  <line x1="680" y1="40" x2="620" y2="60" stroke="#8b5cf6" opacity="0.35"/>
  <line x1="680" y1="80" x2="620" y2="60" stroke="#8b5cf6" opacity="0.35"/>

  <circle cx="600" cy="60" r="36" fill="url(#orbGlow)">
    <animate attributeName="r" values="30;40;30" dur="4s" repeatCount="indefinite"/>
  </circle>

  <circle cx="600" cy="60" r="5" fill="#22d3ee">
    <animate attributeName="cy" values="60;57;60" dur="2.6s" repeatCount="indefinite"/>
  </circle>
</svg>