<svg viewBox="0 0 1200 80" width="100%" height="80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lineGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="80" fill="#0f172a"/>

  <rect x="-200" y="35" width="200" height="10" fill="url(#lineGrad)">
    <animate attributeName="x" values="-200;1200" dur="2.5s" repeatCount="indefinite"/>
  </rect>
</svg>