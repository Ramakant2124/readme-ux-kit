<svg viewBox="0 0 1200 120" width="100%" height="120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="reactorGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#8b5cf6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="120" fill="#020617"/>
  <circle cx="600" cy="60" r="90" fill="url(#reactorGlow)">
    <animate attributeName="r" values="82;96;82" dur="3.8s" repeatCount="indefinite"/>
  </circle>

  <rect x="460" y="57" width="280" height="6" rx="3" fill="#22d3ee" opacity="0.95">
    <animate attributeName="width" values="240;320;240" dur="3.8s" repeatCount="indefinite"/>
    <animate attributeName="x" values="480;440;480" dur="3.8s" repeatCount="indefinite"/>
  </rect>

  <rect x="0" y="0" width="1200" height="120" fill="none" stroke="#1e293b" opacity="0.22"/>
</svg>