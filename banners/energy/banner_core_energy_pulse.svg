<svg viewBox="0 0 1200 120" width="100%" height="120" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="120" fill="#020617"/>

  <circle cx="600" cy="60" r="6" fill="#22d3ee">
    <animate attributeName="r" values="6;12;6" dur="2s" repeatCount="indefinite"/>
  </circle>

  <circle cx="600" cy="60" r="6" stroke="#22d3ee" fill="none">
    <animate attributeName="r" values="6;80" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>