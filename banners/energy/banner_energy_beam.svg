<svg viewBox="0 0 1200 80" width="100%" height="80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="beam" x1="0" x2="1">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="80" fill="#020617"/>

  <rect x="-300" y="35" width="300" height="10" fill="url(#beam)">
    <animate attributeName="x" values="-300;1200" dur="2s" repeatCount="indefinite"/>
  </rect>

  <rect x="-600" y="35" width="300" height="10" fill="url(#beam)">
    <animate attributeName="x" values="-600;900" dur="2s" repeatCount="indefinite"/>
  </rect>
</svg>