<svg viewBox="0 0 1200 120" width="100%" height="120" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="120" fill="#020617"/>

  <!-- grid -->
  <g stroke="#1f2937" stroke-width="1">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
  </g>

  <!-- pulse -->
  <line x1="0" y1="60" x2="1200" y2="60"
        stroke="#22d3ee" stroke-width="2"
        stroke-dasharray="200 1000">
    <animate attributeName="stroke-dashoffset" values="1200;0" dur="3s" repeatCount="indefinite"/>
  </line>
</svg>