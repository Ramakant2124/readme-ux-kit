<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 60" width="100%" height="60">
  <line x1="0" y1="30" x2="1000" y2="30" stroke="#334155" stroke-width="1"/>

  <circle cx="500" cy="30" r="5" fill="#22d3ee">
    <animate attributeName="r" values="5;60;5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>