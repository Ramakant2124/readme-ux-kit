<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 70" width="100%" height="70">
  <defs>
    <linearGradient id="serp1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="serp2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- extended symmetric wave -->
  <path id="wave1"
        d="M0 35 C125 10, 250 10, 375 35 S625 60, 1000 35"
        fill="none"
        stroke="url(#serp1)"
        stroke-width="3"
        stroke-linecap="round"
        stroke-dasharray="12 10">
    <animate attributeName="stroke-dashoffset" from="0" to="-44" dur="2.5s" repeatCount="indefinite"/>
  </path>

  <path id="wave2"
        d="M0 35 C125 60, 250 60, 375 35 S625 10, 1000 35"
        fill="none"
        stroke="url(#serp2)"
        stroke-width="3"
        stroke-linecap="round"
        stroke-dasharray="12 10"
        opacity="0.8">
    <animate attributeName="stroke-dashoffset" from="0" to="44" dur="2.5s" repeatCount="indefinite"/>
  </path>

  <!-- particles now travel full width -->
  <circle r="4" fill="#22d3ee">
    <animateMotion dur="3s" repeatCount="indefinite" rotate="auto">
      <mpath href="#wave1"/>
    </animateMotion>
  </circle>

  <circle r="4" fill="#a855f7">
    <animateMotion dur="3s" repeatCount="indefinite" rotate="auto">
      <mpath href="#wave2"/>
    </animateMotion>
  </circle>
</svg>