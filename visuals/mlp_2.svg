<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">

<defs>
  <!-- Organic neuron gradients -->
  <radialGradient id="neuronA">
    <stop offset="0%" stop-color="#fff"/>
    <stop offset="60%" stop-color="#7dd3fc"/>
    <stop offset="100%" stop-color="#155e75"/>
  </radialGradient>

  <radialGradient id="neuronB">
    <stop offset="0%" stop-color="#fff"/>
    <stop offset="60%" stop-color="#c4b5fd"/>
    <stop offset="100%" stop-color="#4c1d95"/>
  </radialGradient>

  <radialGradient id="coreNeuron">
    <stop offset="0%" stop-color="#fff"/>
    <stop offset="60%" stop-color="#fbbf24"/>
    <stop offset="100%" stop-color="#92400e"/>
  </radialGradient>

  <!-- soft tissue glow -->
  <filter id="bioGlow">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge>
      <feMergeNode in="b"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

</defs>

<!-- ORGANIC CONNECTIONS -->

<g stroke-linecap="round" fill="none" opacity="0.5">

  <!-- input → hidden -->
  <path d="M120 120 Q240 80 360 160" stroke="#7dd3fc" stroke-width="3"/>
  <path d="M120 240 Q260 200 360 160" stroke="#7dd3fc" stroke-width="2"/>
  <path d="M120 240 Q260 260 360 300" stroke="#7dd3fc" stroke-width="3"/>
  <path d="M120 360 Q260 320 360 300" stroke="#7dd3fc" stroke-width="2"/>
  <path d="M120 360 Q260 420 360 440" stroke="#7dd3fc" stroke-width="3"/>
  <path d="M120 480 Q260 460 360 440" stroke="#7dd3fc" stroke-width="2"/>

  <!-- hidden → output -->
  <path d="M360 160 Q520 120 700 300" stroke="#c4b5fd" stroke-width="3"/>
  <path d="M360 300 Q540 300 700 300" stroke="#c4b5fd" stroke-width="4"/>
  <path d="M360 440 Q520 480 700 300" stroke="#c4b5fd" stroke-width="3"/>

</g>

<!-- SIGNAL PULSES (synaptic firing) -->

<g>
  <circle r="3" fill="#7dd3fc" filter="url(#bioGlow)">
    <animateMotion dur="2.2s" repeatCount="indefinite"
      path="M120,240 Q260,260 360,300"/>
  </circle>

  <circle r="3" fill="#7dd3fc" filter="url(#bioGlow)">
    <animateMotion dur="2.6s" repeatCount="indefinite"
      path="M120,360 Q260,420 360,440"/>
  </circle>

  <circle r="3" fill="#c4b5fd" filter="url(#bioGlow)">
    <animateMotion dur="2s" repeatCount="indefinite"
      path="M360,300 Q540,300 700,300"/>
  </circle>
</g>

<!-- INPUT NEURONS -->

<g>
  <circle cx="120" cy="120" r="14" fill="url(#neuronA)" filter="url(#bioGlow)"/>
  <circle cx="120" cy="240" r="16" fill="url(#neuronA)" filter="url(#bioGlow)"/>
  <circle cx="120" cy="360" r="15" fill="url(#neuronA)" filter="url(#bioGlow)"/>
  <circle cx="120" cy="480" r="14" fill="url(#neuronA)" filter="url(#bioGlow)"/>
</g>

<!-- HIDDEN NEURONS (irregular + pulsing like tissue) -->

<g>
  <circle cx="360" cy="160" r="18" fill="url(#neuronB)" filter="url(#bioGlow)">
    <animate attributeName="r" values="16;20;16" dur="3s" repeatCount="indefinite"/>
  </circle>

  <circle cx="360" cy="300" r="22" fill="url(#neuronB)" filter="url(#bioGlow)">
    <animate attributeName="r" values="20;26;20" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <circle cx="360" cy="440" r="18" fill="url(#neuronB)" filter="url(#bioGlow)">
    <animate attributeName="r" values="16;20;16" dur="3.2s" repeatCount="indefinite"/>
  </circle>
</g>

<!-- OUTPUT NEURON (dominant brain core) -->

<g>
  <circle cx="700" cy="300" r="45" fill="url(#coreNeuron)" filter="url(#bioGlow)">
    <animate attributeName="r" values="42;50;42" dur="2s" repeatCount="indefinite"/>
  </circle>

  <circle cx="700" cy="300" r="20" fill="#ffffff" opacity="0.8"/>
</g>

</svg>