<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="voidGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="60%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <linearGradient id="adenine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.8"/> </linearGradient>

    <linearGradient id="cytosine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.9"/> </linearGradient>

    <linearGradient id="violetBackbone" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#c4b5fd" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.1"/>
    </linearGradient>

    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#voidGrad)"/>

  <g opacity="0.3" filter="url(#neonGlow)">
    <circle cx="210" cy="200" r="3" fill="#ffffff">
      <animate attributeName="opacity" values="0.1;1;0.1" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="850" cy="250" r="4" fill="#67e8f9">
      <animate attributeName="opacity" values="0;1;0" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(512 512) scale(0.8) rotate(15)">
    <ellipse cx="0" cy="0" rx="45" ry="400" fill="none" stroke="url(#violetBackbone)" stroke-width="6" filter="url(#neonGlow)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="0" cy="0" rx="35" ry="380" fill="none" stroke="#22d3ee" stroke-width="3" stroke-dasharray="10 30" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="15s" repeatCount="indefinite"/>
    </ellipse>

    <g filter="url(#neonGlow)">

      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/>
        <circle cx="0" cy="-280" r="14" fill="#fbbf24"/>
        <line x1="0" y1="-280" x2="35" y2="-280" stroke="#f59e0b" stroke-width="1"/>
        <circle cx="0" cy="-280" r="4" fill="#ffffff"/>
      </g>

      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="14s" repeatCount="indefinite"/>
        <circle cx="0" cy="-140" r="12" fill="#8b5cf6"/>
        <line x1="0" y1="-140" x2="-45" y2="-140" stroke="#c4b5fd" stroke-width="1.5"/>
        <circle cx="0" cy="-140" r="4" fill="#ffffff"/>
      </g>

      <g>
        <circle cx="0" cy="0" r="18" fill="#ffffff" filter="url(#neonGlow)"/>
        <circle cx="0" cy="0" r="6" fill="#67e8f9"/>
      </g>

      <g stroke="#ffffff" stroke-opacity="0.2">
        <line x1="-35" y1="-200" x2="35" y2="200" stroke-width="1"/>
        <line x1="35" y1="-200" x2="-35" y2="200" stroke-width="1"/>
      </g>

      <g>
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="16s" repeatCount="indefinite"/>
        <circle cx="0" cy="140" r="12" fill="#22d3ee"/>
        <line x1="0" y1="140" x2="35" y2="140" stroke="#67e8f9" stroke-width="1.5"/>
        <circle cx="0" cy="140" r="4" fill="#ffffff"/>
      </g>

      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="18s" repeatCount="indefinite"/>
        <circle cx="0" cy="280" r="14" fill="#fde047"/>
        <line x1="0" y1="280" x2="-45" y2="280" stroke="#fbbf24" stroke-width="1"/>
        <circle cx="0" cy="280" r="4" fill="#ffffff"/>
      </g>
    </g>
  </g>

  <g opacity="0.8" filter="url(#neonGlow)">
     <circle r="2.5" cx="720" cy="720" fill="#67e8f9">
       <animateTransform attributeName="transform" type="translate" values="0,0; -40,-40; 0,0" dur="4s" repeatCount="indefinite"/>
     </circle>

     <path d="M800 150 L820 160 L810 180 L790 170 Z" fill="#fde047" opacity="0.6"/>
  </g>
</svg>
