<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
<defs>

<radialGradient id="bg" cx="50%" cy="50%" r="70%">
  <stop offset="0%" stop-color="#0b1220"/>
  <stop offset="60%" stop-color="#020617"/>
  <stop offset="100%" stop-color="#000"/>
</radialGradient>

<radialGradient id="core">
  <stop offset="0%" stop-color="#ffffff"/>
  <stop offset="30%" stop-color="#22d3ee"/>
  <stop offset="60%" stop-color="#8b5cf6"/>
  <stop offset="100%" stop-color="#020617"/>
</radialGradient>

<linearGradient id="link" x1="0" x2="1">
  <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.1"/>
  <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.9"/>
  <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.1"/>
</linearGradient>

<filter id="glow">
  <feGaussianBlur stdDeviation="10"/>
</filter>

</defs>

<rect width="1024" height="1024" fill="url(#bg)"/>

<!-- rotating outer rings -->
<g transform="translate(512 512)">
  <circle r="420" stroke="#1e293b" fill="none"/>
  <circle r="380" stroke="#22d3ee" stroke-dasharray="10 30" opacity="0.3">
    <animateTransform type="rotate" from="0" to="360" dur="40s" repeatCount="indefinite"/>
  </circle>
  <circle r="330" stroke="#8b5cf6" stroke-dasharray="6 18" opacity="0.25">
    <animateTransform type="rotate" from="360" to="0" dur="30s" repeatCount="indefinite"/>
  </circle>
</g>

<!-- dense neural lattice -->
<g stroke="url(#link)" stroke-width="2" opacity="0.6">
  <!-- MANY crossing paths -->
  <path d="M200 400 Q512 200 824 400"/>
  <path d="M200 500 Q512 350 824 500"/>
  <path d="M200 600 Q512 800 824 600"/>
  <path d="M250 300 Q512 500 780 300"/>
  <path d="M250 700 Q512 500 780 700"/>
</g>

<!-- signal flow -->
<g>
  <circle r="4" fill="#22d3ee">
    <animateMotion dur="2s" repeatCount="indefinite"
      path="M200,500 Q512,350 824,500"/>
  </circle>

  <circle r="4" fill="#c4b5fd">
    <animateMotion dur="2.6s" repeatCount="indefinite"
      path="M250,300 Q512,500 780,300"/>
  </circle>
</g>

<!-- core -->
<g transform="translate(512 512)">
  <circle r="120" fill="url(#core)" filter="url(#glow)">
    <animate attributeName="r" values="110;130;110" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle r="60" fill="#fff"/>
</g>

</svg>