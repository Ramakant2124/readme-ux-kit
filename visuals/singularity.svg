<svg viewBox="0 0 800 400" width="100%" height="400" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- Background gradient -->
    <radialGradient id="bgGrad">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- Core glow -->
    <radialGradient id="coreGrad">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>

    <!-- Turbulence (procedural noise) -->
    <filter id="warp">
      <feTurbulence type="fractalNoise" baseFrequency="0.01 0.02" numOctaves="3" seed="2">
        <animate attributeName="baseFrequency" values="0.01 0.02;0.02 0.03;0.01 0.02" dur="10s" repeatCount="indefinite"/>
      </feTurbulence>

      <feDisplacementMap in="SourceGraphic" scale="40"/>
    </filter>

    <!-- Glow blur -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Lighting -->
    <filter id="light">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="5" specularConstant="1.2" specularExponent="20" lighting-color="#ffffff">
        <fePointLight x="400" y="200" z="100"/>
      </feSpecularLighting>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)"/>

  <!-- Warped field -->
  <circle cx="400" cy="200" r="150" fill="url(#coreGrad)" filter="url(#warp)" opacity="0.6"/>

  <!-- Core -->
  <circle cx="400" cy="200" r="60" fill="url(#coreGrad)" filter="url(#glow)">
    <animate attributeName="r" values="55;70;55" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Orbiting particles -->
  <g fill="#22d3ee">
    <circle r="4">
      <animateMotion dur="6s" repeatCount="indefinite"
        path="M400,200 m-120,0 a120,120 0 1,0 240,0 a120,120 0 1,0 -240,0"/>
    </circle>
    <circle r="3" fill="#8b5cf6">
      <animateMotion dur="9s" repeatCount="indefinite"
        path="M400,200 m-180,0 a180,180 0 1,0 360,0 a180,180 0 1,0 -360,0"/>
    </circle>
  </g>

  <!-- Energy arcs -->
  <g stroke="#22d3ee" fill="none" stroke-width="1.5" filter="url(#glow)">
    <path>
      <animate attributeName="d" dur="3s" repeatCount="indefinite"
        values="
        M250,200 Q400,100 550,200;
        M250,200 Q400,300 550,200;
        M250,200 Q400,100 550,200
        "/>
    </path>
  </g>

  <!-- Lighting overlay -->
  <circle cx="400" cy="200" r="150" fill="none" filter="url(#light)" opacity="0.4"/>

</svg>