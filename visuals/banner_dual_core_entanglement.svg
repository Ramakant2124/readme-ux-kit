<svg viewBox="0 0 800 400" width="100%" height="400" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="g1">
    <stop offset="0%" stop-color="#22d3ee"/>
    <stop offset="100%" stop-color="#020617"/>
  </radialGradient>

  <radialGradient id="g2">
    <stop offset="0%" stop-color="#8b5cf6"/>
    <stop offset="100%" stop-color="#020617"/>
  </radialGradient>

  <filter id="warp">
    <feTurbulence baseFrequency="0.02" numOctaves="3" seed="3">
      <animate attributeName="baseFrequency" values="0.02;0.04;0.02" dur="8s" repeatCount="indefinite"/>
    </feTurbulence>
    <feDisplacementMap in="SourceGraphic" scale="50"/>
  </filter>
</defs>

<rect width="800" height="400" fill="#020617"/>

<circle cx="300" cy="200" r="90" fill="url(#g1)" filter="url(#warp)" opacity="0.7"/>
<circle cx="500" cy="200" r="90" fill="url(#g2)" filter="url(#warp)" opacity="0.7"/>

</svg>